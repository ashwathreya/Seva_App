.sora{font-family:'Sora',system-ui,sans-serif}
::-webkit-scrollbar{display:none}

.tab-btn{background:none;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn:hover{opacity:.8}
.press{transition:all .15s;cursor:pointer}
.press:hover{transform:translateY(-1px);filter:brightness(1.07)}
.card-lift{transition:all .2s;cursor:pointer}
.card-lift:hover{transform:translateY(-3px)}

@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,.5)}50%{box-shadow:0 0 0 9px rgba(240,165,0,0)}}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-dot{animation:pulse-dot 1.2s ease infinite}

.phone-wrap{width:250px;border-radius:38px;background:#252C3E;padding:3px;

.phone-inner-light{border-radius:35px;background:#F1F3F8;overflow:hidden;min-height:490px;position:relative}
.phone-inner-dark{border-radius:35px;background:#0E101A;overflow:hidden;min-height:490px;position:relative}
.phone-status{display:flex;justify-content:space-between;align-items:center;padding:11px 18px 0;font-size:9px;font-weight:700}
.phone-notch{width:64px;height:15px;border-radius:8px}

.bottom-nav{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:9px 0 13px}
.nav-item{text-align:center;cursor:pointer}
.nav-label{font-size:7.5px;margin-top:2px}
.screen-scroll{overflow-y:auto;max-height:calc(490px - 26px);padding-bottom:72px;-webkit-overflow-scrolling:touch}
.trust-line{font-size:8px;color:#5C6578;line-height:1.35;letter-spacing:.01em}
.trust-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:7.5px;font-weight:600;border:1px solid rgba(11,13,18,.08);background:#FAFBFD;color:#3D4556}
.chat-bubble-me{background:#0B0D12;color:#fff;border-radius:12px 12px 4px 12px;padding:8px 10px;font-size:9px;max-width:85%;margin-left:auto}
.chat-bubble-them{background:#fff;border:1px solid #EBEBF0;border-radius:12px 12px 12px 4px;padding:8px 10px;font-size:9px;color:#333;max-width:88%}

@keyframes otp-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.otp-cursor{display:inline-block;width:1px;height:12px;background:#0B0D12;margin-left:1px;animation:otp-blink 1s step-end infinite;vertical-align:-2px}
@keyframes scan-sweep{0%{top:8%}50%{top:72%}100%{top:8%}}

.loc-ring.d3{animation-delay:1.2s}

@keyframes mem-shine{from{background-position:0% 50%}to{background-position:200% 50%}}

/* Seva monogram — metallic gold tile + letter S (primary mark) */
.seva-mark{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  background:
    linear-gradient(155deg, #FFFBF0 0%, #F5E6C8 12%, #E8C056 35%, #C5890E 58%, #8B5A0A 78%, #D4A21F 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.42) inset,
    0 -2px 8px rgba(0,0,0,.22) inset,
    0 2px 3px rgba(255,255,255,.35) inset,
    0 10px 28px rgba(180,100,8,.38),
    0 28px 56px rgba(240,165,0,.14);
}
.seva-mark::before{
  content:'';
  position:absolute;
  top:-40%;
  left:-25%;
  width:70%;
  height:120%;
  background:linear-gradient(118deg, transparent 0%, rgba(255,255,255,.55) 42%, rgba(255,255,255,.08) 52%, transparent 65%);
  transform:rotate(-18deg);
  pointer-events:none;
}
.seva-mark::after{
  content:'';
  position:absolute;
  inset:2px;
  border-radius:inherit;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 0 0 1px rgba(0,0,0,.06) inset;
  pointer-events:none;
}
.seva-mark-letter{
  font-family:'Sora',system-ui,sans-serif;
  font-weight:800;
  color:#100A14;
  line-height:1;
  letter-spacing:-0.06em;
  text-shadow:0 1px 0 rgba(255,255,255,.45), 0 -1px 1px rgba(0,0,0,.12);
  position:relative;
  z-index:1;
}
.seva-mark--nav{width:28px;height:28px;border-radius:8px;}
.seva-mark--nav .seva-mark-letter{font-size:15px;}
.seva-mark--header{width:34px;height:34px;border-radius:10px;}
.seva-mark--header .seva-mark-letter{font-size:18px;}
.seva-mark--splash{width:80px;height:80px;border-radius:22px;}
.seva-mark--splash .seva-mark-letter{font-size:42px;}
.seva-mark--splash{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.38) inset,
    0 -3px 12px rgba(0,0,0,.28) inset,
    0 3px 4px rgba(255,255,255,.4) inset,
    0 0 0 1px rgba(240,165,0,.15),
    0 16px 48px rgba(200,120,20,.45),
    0 40px 100px rgba(240,165,0,.2);
}
/* Services-inside-S SVG mark (masked mosaic) */
.seva-mark-svg-wrap{position:relative;display:flex;align-items:center;justify-content:center;line-height:0;}
.seva-mark-svg-wrap svg{display:block;width:100%;height:100%;}
.seva-mark-svg-wrap img{display:block;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;}
.seva-mark-svg--nav svg,.seva-mark-svg--nav img{filter:drop-shadow(0 3px 10px rgba(160,95,12,.28));}
.seva-mark-svg--header svg,.seva-mark-svg--header img{filter:drop-shadow(0 5px 14px rgba(160,95,12,.32));}
.seva-mark-svg--splash svg,.seva-mark-svg--splash img{filter:drop-shadow(0 14px 40px rgba(200,120,20,.48)) drop-shadow(0 4px 14px rgba(0,0,0,.22));}

  const dim={
    nav:[52,52],
    header:[64,64],
    splash:[130,130],
  };
  const [bw,bh]=dim[variant]||dim.header;
  const wrap=h('div',{cls:'seva-mark-svg-wrap seva-mark-svg--'+variant,style:{width:bw+'px',height:bh+'px',flexShrink:'0'}});
  wrap.appendChild(h('img',{src:'seva_logo_new.png',alt:'SEVA logo',style:{width:'100%',height:'100%',objectFit:'contain',display:'block',userSelect:'none',WebkitUserDrag:'none'}}));
  return wrap;
}
/** Solid gold tile + S — optional fallback for favicon-scale comparisons. */
function SevaMarkTile(variant){
  return h('div',{cls:'seva-mark seva-mark--'+variant},
    h('span',{cls:'seva-mark-letter'},'S'));
}

function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='html') el.innerHTML=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='cls') el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null) return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function icon(paths,size=14,color='currentColor'){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.setAttribute('stroke',color);svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
  svg.style.flexShrink='0';svg.style.display='block';
  paths.forEach(d=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);svg.appendChild(p);
  });
  return svg;
}

  signIn.onclick=(e)=>{e&&e.stopPropagation&&e.stopPropagation(); next();};
  actions.appendChild(signIn);
  phaseWelcome.appendChild(actions);

  s.appendChild(phaseStatic);
  s.appendChild(phaseVideo);
  s.appendChild(phaseWelcome);

  let tVideo=null,tFallback=null,welcoming=false;
  const goWelcome=()=>{
    if(welcoming) return;
    welcoming=true;
    if(tVideo){clearTimeout(tVideo);tVideo=null;}
    if(tFallback){clearTimeout(tFallback);tFallback=null;}
    phaseWelcome.style.display='flex';
    phaseWelcome.style.transition='opacity '+crossMs+'ms '+ease;
    phaseVideo.style.transition='opacity '+crossMs+'ms '+ease;
    requestAnimationFrame(()=>{
      phaseVideo.style.opacity='0';
      phaseWelcome.style.opacity='1';
    });
    setTimeout(()=>{
      phaseVideo.style.display='none';
      phaseStatic.style.display='none';
      phaseVideo.style.pointerEvents='none';
      try{vid.pause();}catch(e){}
      phaseVideo.style.transition='';
      phaseWelcome.style.transition='';
    },crossMs+40);
  };
  const startVideo=()=>{
    phaseVideo.style.display='block';
    phaseVideo.style.pointerEvents='auto';
    phaseStatic.style.transition='opacity '+crossMs+'ms '+ease;
    phaseVideo.style.transition='opacity '+crossMs+'ms '+ease;
    const p=vid.play();
    if(p&&typeof p.catch==='function') p.catch(()=>{goWelcome();});
    requestAnimationFrame(()=>{
      phaseStatic.style.opacity='0';
      phaseVideo.style.opacity='1';
    });
    setTimeout(()=>{
      phaseStatic.style.display='none';
      phaseStatic.style.opacity='1';
      phaseStatic.style.transition='';
      phaseVideo.style.transition='';
    },crossMs+40);
    tFallback=setTimeout(goWelcome,12000);
  };
  vid.addEventListener('ended',goWelcome);
  vid.addEventListener('error',()=>{setTimeout(goWelcome,400);});

  setTimeout(startVideo,2000);

  return s;
}

const CHAIN_S_SPINE='M152,46 C72,38 34,62 40,108 C44,132 70,144 116,150 C158,158 168,188 152,218 C136,238 68,236 48,196';
const CHAIN_ICONS={
  truck:'M2.5,14.5 h14.5 v4.5 h7.5 v2.8 H2.5 z M4.9,20 a2.3,2.3 0 1 1 4.7,0 M12.4,20 a2.3,2.3 0 1 1 4.7,0',

};
const CHAIN_ORDER=['truck','house','wrench','droplet','snowflake','plug','fork','package','person','sofa','paint','broom','pin','shield','ac','truck'];

function chainSvgMarkup(suf,iconColor,spineStroke){
  const symHtml=Object.keys(CHAIN_ICONS).map(k=>'<symbol id="'+suf+'-sym-'+k+'" viewBox="0 0 24 24"><path d="'+CHAIN_ICONS[k]+'" fill="none" stroke="currentColor" stroke-width="2.15" stroke-linecap="round" stroke-linejoin="round"/></symbol>').join('');
  return '<svg data-chain="'+suf+'" viewBox="0 0 200 232" xmlns="http://www.w3.org/2000/svg" style="max-height:300px;width:100%;display:block" aria-label="Seva services along S curve">'+
'<defs>'+symHtml+'</defs>'+
'<path class="seva-chain-spine" data-op="0.32" d="'+CHAIN_S_SPINE+'" fill="none" stroke="'+spineStroke+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>'+
'<g class="seva-chain-icons" fill="none" style="color:'+iconColor+'"></g>'+
'</svg>';
}

function initSevaChainPlaceIcons(svg){
  if(!svg||svg.dataset.chainPlaced) return;
  svg.dataset.chainPlaced='1';
  const suf=svg.getAttribute('data-chain');
  const path=svg.querySelector('.seva-chain-spine');
  const layer=svg.querySelector('.seva-chain-icons');
  if(!path||!layer||!suf) return;
  const plen=path.getTotalLength();
  if(plen<=0) return;
  layer.innerHTML='';
  const n=CHAIN_ORDER.length;
  const delta=2.8;
  for(let i=0;i<n;i++){
    const t=(n<=1?0.5*plen:(i/(n-1))*plen);
    const p=path.getPointAtLength(t);
    const p2=path.getPointAtLength(Math.min(t+delta,plen));
    const ang=Math.atan2(p2.y-p.y,p2.x-p.x)*180/Math.PI;
    const u=document.createElementNS('http://www.w3.org/2000/svg','use');
    u.setAttribute('href','#'+suf+'-sym-'+CHAIN_ORDER[i]);
    u.setAttribute('transform','translate('+p.x.toFixed(2)+','+p.y.toFixed(2)+') rotate('+ang.toFixed(2)+') scale(0.76) translate(-12,-12)');
    layer.appendChild(u);
  }
}

  const chkWrap=h('label',{style:{display:'inline-flex',alignItems:'center',gap:'8px',cursor:'pointer',marginBottom:'14px',fontSize:'10px',color:'#C8CED9',userSelect:'none'}});

  row.appendChild(lightCell);

  wrap.appendChild(block);

  const syncSpine=()=>{
    const show=cb.checked;
    [lightCell.querySelector('svg'),darkCell.querySelector('svg')].forEach(svg=>{
      if(!svg) return;
      const spine=svg.querySelector('.seva-chain-spine');

  };
  cb.addEventListener('change',syncSpine);
  requestAnimationFrame(()=>{
    initSevaChainPlaceIcons(lightCell.querySelector('svg'));

  const root=h('div',{style:{background:BG,minHeight:'100vh',color:'#fff',borderRadius:'12px',overflow:'hidden'}});

  // Top header
  const top=h('div',{style:{padding:'18px 20px 0',borderBottom:'1px solid rgba(255,255,255,.06)'}});
  const brandRow=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}});
  brandRow.append(
    SevaMark('header'),
    h('span',{style:{fontSize:'10px',padding:'2px 9px',borderRadius:'12px',background:'rgba(240,165,0,.1)',color:G,fontWeight:600}},'Preview')
  );
  top.appendChild(brandRow);

  const regRow=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'12px'}});
  regRow.appendChild(h('span',{style:{fontSize:'10px',color:T2}},'Market:'));
  ['IN','US'].forEach(code=>{
    const on=state.region===code;
    regRow.appendChild(h('div',{cls:'press',style:{padding:'5px 12px',borderRadius:'999px',fontSize:'10px',fontWeight:600,cursor:'pointer',background:on?G:'rgba(255,255,255,.08)',color:on?BG:'#C8D0DC',border:on?'none':'1px solid rgba(255,255,255,.12)'},onclick:()=>{state.region=code;renderApp();}},code==='IN'?'🇮🇳 India':'🇺🇸 United States'));
  });
  regRow.appendChild(h('span',{style:{fontSize:'9px',color:T2,maxWidth:'340px',lineHeight:1.35}},'Switches currency, phone, tax labels, ID copy, and sample addresses. Legal KYC differs by country.'));
  top.appendChild(regRow);

  // Tab rows (wrap for many flows)
  const tabRow=h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',alignItems:'center'}});
  [
    {id:'landing',label:'🌐 Web'},
    {id:'logoLab',label:'◆ Logo'},
    {id:'customer',label:'📱 Customer'},
    {id:'pro',label:'🔨 Pro'},
    {id:'splashTab',label:'✨ Splash',resetSignupStep:true},
    {id:'signupFlow',label:'👤 Signup'},
    {id:'aiBooking',label:'🤖 AI book'},
    {id:'membership',label:'💎 Member'},
    {id:'proJoin',label:'🔨 Join'},
    {id:'rewards',label:'🎁 Rewards'},
    {id:'adminDash',label:'🛠 Admin'},
  ].forEach(t=>{
    const btn=h('div',{cls:'tab-btn',style:{padding:'7px 12px',borderRadius:'8px 8px 0 0',background:state.tab===t.id?G:'transparent',color:state.tab===t.id?BG:T2,fontSize:'11px',fontWeight:500,cursor:'pointer'},onclick:()=>{state.tab=t.id; if(t.resetSignupStep) state.signupStep=0; renderApp();}},t.label);
    tabRow.appendChild(btn);
  });
  top.appendChild(tabRow);
  root.appendChild(top);

  // Content
  const content=h('div',{style:{padding:'22px 20px'}});

  if(state.tab==='landing'){
    content.appendChild(renderLanding());
  }

  if(state.tab==='logoLab'){
    content.appendChild(renderLogoVariations());
  }

  if(state.tab==='customer'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'10px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,maxWidth:'560px',textAlign:'center',lineHeight:1.45}},'Positioning vs. open gig boards + catalog home apps: vetting over volume, scope lock over bundles, escrow over rush-to-book · Flow: onboard → match → chat → request → confirm · Tap below to jump'));
    const row1=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',justifyContent:'center'}});
    [{id:'onboarding',label:'🛡️ Onboarding'},{id:'home',label:'🏠 Home'},{id:'profile',label:'👤 Profile'},{id:'chat',label:'💬 Chat'}].forEach(sc=>{
      row1.appendChild(h('div',{cls:'press',style:{padding:'5px 10px',borderRadius:'20px',background:state.cScreen===sc.id?G:'rgba(255,255,255,.07)',color:state.cScreen===sc.id?BG:T2,fontSize:'10px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.cScreen=sc.id;renderApp();}},sc.label));
    });
    const row2=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',justifyContent:'center'}});
    [{id:'booking',label:'📋 Request'},{id:'pricing',label:'💰 Price'},{id:'confirm',label:'✓ Confirm'},{id:'tracking',label:'📍 Live'}].forEach(sc=>{
      row2.appendChild(h('div',{cls:'press',style:{padding:'5px 10px',borderRadius:'20px',background:state.cScreen===sc.id?G:'rgba(255,255,255,.07)',color:state.cScreen===sc.id?BG:T2,fontSize:'10px',fontWeight:600,cursor:'pointer'},onclick:()=>{
        if(sc.id==='pricing'){state.cPricingReturn='booking';state.cScreen='pricing';}
        else state.cScreen=sc.id;
        renderApp();
      }},sc.label));
    });
    wrap.appendChild(row1);
    wrap.appendChild(row2);
    const phone=h('div',{cls:'phone-wrap'});
    const inner=h('div',{cls:'phone-inner-light'});
    inner.appendChild(h('div',{cls:'phone-status',style:{color:'#1A1A2E'}},h('span',null,'9:41'),h('div',{cls:'phone-notch',style:{background:'#1A1A2E'}}),h('span',{style:{fontSize:'8px'}},'●●●')));
    const goHome=()=>{state.cScreen='home';renderApp();};
    const goProfile=()=>{state.cScreen='profile';renderApp();};
    const goChat=()=>{state.cScreen='chat';renderApp();};
    const goBooking=()=>{state.cScreen='booking';renderApp();};
    const goConfirm=()=>{state.cScreen='confirm';renderApp();};
    const goTrack=()=>{state.cScreen='tracking';renderApp();};
    const finishOnboard=()=>{state.cScreen='home';state.cOnboard=0;renderApp();};
    const openPricingFromBooking=()=>{state.cPricingReturn='booking';state.cScreen='pricing';renderApp();};
    const openPricingFromConfirm=()=>{state.cPricingReturn='confirm';state.cScreen='pricing';renderApp();};
    const closePricing=()=>{state.cScreen=state.cPricingReturn||'booking';state.cPricingReturn=null;renderApp();};
    const pricingBackLabel=state.cPricingReturn==='confirm'?'Back to confirmation':'Back to booking';
    if(state.cScreen==='onboarding') inner.appendChild(screenCustOnboarding(finishOnboard,finishOnboard));
    if(state.cScreen==='home') inner.appendChild(screenCustHome(goBooking,goProfile));
    if(state.cScreen==='profile') inner.appendChild(screenCustProviderProfile(goHome,goChat,goBooking));
    if(state.cScreen==='chat') inner.appendChild(screenCustChat(goProfile,goBooking));
    if(state.cScreen==='booking') inner.appendChild(screenCustBooking(goConfirm,openPricingFromBooking));
    if(state.cScreen==='pricing') inner.appendChild(screenPricingBreakdown(closePricing,pricingBackLabel));
    if(state.cScreen==='confirm') inner.appendChild(screenCustConfirm(goTrack,openPricingFromConfirm));
    if(state.cScreen==='tracking') inner.appendChild(screenCustTracking());
    phone.appendChild(inner);
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='signupFlow'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,textAlign:'center'}},R().signupFlowHint+' · Blinking OTP · Pulse rings'));
    const chips=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',justifyContent:'center'}});
    [0,1,2,3,4].forEach(i=>{
      chips.appendChild(h('div',{cls:'press',style:{padding:'4px 8px',borderRadius:'12px',background:state.signupStep===i?G:'rgba(255,255,255,.07)',color:state.signupStep===i?BG:T2,fontSize:'9px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.signupStep=i;renderApp();}},String(i)));
    });
    wrap.appendChild(chips);
    const phone=h('div',{cls:'phone-wrap'});
    phone.appendChild(renderSignupFlow());
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='aiBooking'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,textAlign:'center'}},R().aiTabHint+' · Jump steps:'));
    const chips=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',justifyContent:'center'}});
    [0,1,2].forEach(i=>{
      chips.appendChild(h('div',{cls:'press',style:{padding:'4px 8px',borderRadius:'12px',background:state.aiStep===i?G:'rgba(255,255,255,.07)',color:state.aiStep===i?BG:T2,fontSize:'9px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.aiStep=i;window.clearTimeout(window._aiT);renderApp();}},['Cam','Scan','Done'][i]));
    });
    wrap.appendChild(chips);
    const phone=h('div',{cls:'phone-wrap'});
    phone.appendChild(renderAiBookingFlow());
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='membership'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,textAlign:'center'}},'3 tiers · Toggle Annual — prices drop 20% instantly · Pro = gold border'));
    const phone=h('div',{cls:'phone-wrap'});
    const inner=h('div',{cls:'phone-inner-dark'});
    inner.appendChild(flowPhoneStatus(true));
    inner.appendChild(screenMembership());
    phone.appendChild(inner);
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='splashTab'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,textAlign:'center'}},'Splash preview · Tap to continue'));
    const phone=h('div',{cls:'phone-wrap'});
    phone.appendChild(renderSignupFlow());
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='proJoin'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,textAlign:'center'}},R().proJoinFlowHint));
    const chips=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',justifyContent:'center'}});
    [0,1,2,3].forEach(i=>{
      chips.appendChild(h('div',{cls:'press',style:{padding:'4px 8px',borderRadius:'12px',background:state.proJoinStep===i?G:'rgba(255,255,255,.07)',color:state.proJoinStep===i?BG:T2,fontSize:'9px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.proJoinStep=i;renderApp();}},String(i)));
    });
    wrap.appendChild(chips);
    const phone=h('div',{cls:'phone-wrap'});
    phone.appendChild(renderProJoinFlow());
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='pro'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'14px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,maxWidth:'420px',textAlign:'center',lineHeight:1.45}},'Supply-side wedge: visible take rate & predictable penalties vs. opaque commission stacks on large marketplaces'));
    const screenBtns=h('div',{style:{display:'flex',gap:'6px',justifyContent:'center'}});
    [{id:'jobs',label:'💼 My Jobs'},{id:'earnings',label:'💰 Earnings'}].forEach(sc=>{
      const btn=h('div',{cls:'press',style:{padding:'6px 13px',borderRadius:'20px',background:state.pScreen===sc.id?G:'rgba(255,255,255,.07)',color:state.pScreen===sc.id?BG:T2,fontSize:'11px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.pScreen=sc.id;renderApp();}},sc.label);
      screenBtns.appendChild(btn);
    });
    wrap.appendChild(screenBtns);
    const phone=h('div',{cls:'phone-wrap'});
    const inner=h('div',{cls:'phone-inner-dark'});
    inner.appendChild(h('div',{cls:'phone-status',style:{color:'rgba(255,255,255,.6)'}},h('span',null,'9:41'),h('div',{cls:'phone-notch',style:{background:'#333'}}),h('span',{style:{fontSize:'8px'}},'●●●')));
    if(state.pScreen==='jobs') inner.appendChild(screenProJobs());
    if(state.pScreen==='earnings') inner.appendChild(screenProEarnings());
    phone.appendChild(inner);
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='rewards'){
    const wrap=h('div',{cls:'fade-in',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});
    wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,maxWidth:'520px',textAlign:'center',lineHeight:1.45}},'Uber-style clarity: wallet + referral on first paid job · Pro quests & Standard tier vs star games · Toggle 🇮🇳 / 🇺🇸 for amounts'));
    const chips=h('div',{style:{display:'flex',gap:'6px',justifyContent:'center',flexWrap:'wrap'}});
    [{id:'cust',l:'👤 Customer wallet'},{id:'pro',l:'🔨 Pro quests'}].forEach(x=>{
      chips.appendChild(h('div',{cls:'press',style:{padding:'5px 14px',borderRadius:'20px',background:state.rewardPanel===x.id?G:'rgba(255,255,255,.07)',color:state.rewardPanel===x.id?BG:T2,fontSize:'10px',fontWeight:600,cursor:'pointer'},onclick:()=>{state.rewardPanel=x.id;renderApp();}},x.l));
    });
    wrap.appendChild(chips);
    const phone=h('div',{cls:'phone-wrap'});
    const inner=h('div',{cls:state.rewardPanel==='cust'?'phone-inner-light':'phone-inner-dark'});
    inner.appendChild(h('div',{cls:'phone-status',style:{color:state.rewardPanel==='cust'?'#1A1A2E':'rgba(255,255,255,.6)'}},h('span',null,'9:41'),h('div',{cls:'phone-notch',style:{background:state.rewardPanel==='cust'?'#1A1A2E':'#333'}}),h('span',{style:{fontSize:'8px'}},'●●●')));
    if(state.rewardPanel==='cust') inner.appendChild(screenCustRewards());
    else inner.appendChild(screenProRewards());
    phone.appendChild(inner);
    wrap.appendChild(phone);
    content.appendChild(wrap);
  }

  if(state.tab==='adminDash'){
    content.appendChild(renderAdminDashboardPanel());
  }

  root.appendChild(content);
  app.appendChild(root);
}

function renderAdminDashboardPanel(){
  const wrap=h('div',{cls:'fade-in',style:{maxWidth:'720px',margin:'0 auto'}});
  wrap.appendChild(h('h2',{cls:'sora',style:{fontSize:'20px',fontWeight:800,color:'#fff',marginBottom:'10px'}},'Internal admin (React)'));
  wrap.appendChild(h('p',{style:{fontSize:'12px',color:T2,lineHeight:1.55,marginBottom:'14px'}},'Operators dashboard: users, vetting, bookings, disputes, metrics. Lives in '));
  wrap.appendChild(h('code',{style:{display:'block',fontSize:'11px',background:'rgba(0,0,0,.25)',padding:'12px 14px',borderRadius:'8px',color:'#C8D0DC',marginBottom:'12px',whiteSpace:'pre-wrap'}},
'cd admin\nnpm install\nnpm run dev\n→ http://localhost:5173'));
  wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2,lineHeight:1.5}},'Production-style static build: '));
  wrap.appendChild(h('code',{style:{display:'block',fontSize:'11px',background:'rgba(0,0,0,.25)',padding:'10px 14px',borderRadius:'8px',color:'#C8D0DC',marginBottom:'12px'}},'npm run build  →  admin/dist/'));
  wrap.appendChild(h('p',{style:{fontSize:'11px',color:T2}},'Mock in-memory data today; wire to Firestore / API when backend is live.'));
  return wrap;
}

renderApp();
</script>
</body>
